<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }
        .input-field {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: border-color 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .message-area {
            min-height: 60px;
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }
        .hidden {
            display: none;
        }
        .status-success {
            color: #48bb78;
        }
        .status-error {
            color: #f56565;
        }
        .status-info {
            color: #4a5568;
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="game-screen" class="card fade-in">
        <h1 class="text-3xl font-bold text-center mb-2 text-indigo-700">Secure Guessing Game</h1>
        <p class="text-center text-gray-500 font-medium mb-6 italic">Designed by Siyabonga Mkhize</p>
        
        <div id="difficulty-selector" class="mb-6">
            <p class="text-center text-gray-600 mb-4 font-medium">Select Difficulty Level:</p>
            <div class="flex justify-center space-x-2">
                <button data-difficulty="easy" class="diff-btn px-4 py-2 rounded-lg bg-green-100 text-green-700 border border-green-200 hover:bg-green-200 transition-colors">Easy (1-50)</button>
                <button data-difficulty="medium" class="diff-btn px-4 py-2 rounded-lg bg-blue-100 text-blue-700 border border-blue-200 hover:bg-blue-200 transition-colors">Medium (1-100)</button>
                <button data-difficulty="hard" class="diff-btn px-4 py-2 rounded-lg bg-red-100 text-red-700 border border-red-200 hover:bg-red-200 transition-colors">Hard (1-500)</button>
            </div>
        </div>

        <div id="game-content" class="hidden">
            <div class="bg-indigo-50 rounded-xl p-4 mb-6 text-center text-indigo-800 text-sm">
                I've selected a number between <span id="low-range" class="font-bold">1</span> and <span id="high-range" class="font-bold">100</span>.<br>
                Can you guess what it is?
            </div>

            <div class="space-y-4">
                <div class="flex items-center space-x-3">
                    <input type="number" id="guess-input" class="input-field" placeholder="Enter your guess" min="1" max="500">
                    <button id="guess-btn" class="btn w-1/3">Guess</button>
                </div>
                
                <div id="game-message" class="message-area status-info"></div>
                
                <div class="flex justify-between items-center text-sm text-gray-500 pt-4 border-t">
                    <span>Attempts: <span id="attempt-count" class="font-bold">0</span></span>
                    <button id="reset-btn" class="text-indigo-600 font-semibold hover:underline">Change Difficulty</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameScreen = document.getElementById('game-screen');
        
        const guessInput = document.getElementById('guess-input');
        const guessBtn = document.getElementById('guess-btn');
        const gameMessage = document.getElementById('game-message');
        const attemptCount = document.getElementById('attempt-count');
        const resetBtn = document.getElementById('reset-btn');
        
        const difficultySelector = document.getElementById('difficulty-selector');
        const gameContent = document.getElementById('game-content');
        const lowRangeSpan = document.getElementById('low-range');
        const highRangeSpan = document.getElementById('high-range');
        const diffBtns = document.querySelectorAll('.diff-btn');

        // Difficulty Selection
        diffBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const difficulty = btn.getAttribute('data-difficulty');
                startNewGame(difficulty);
            });
        });

        // Start New Game
        async function startNewGame(difficulty = 'medium') {
            try {
                const response = await fetch('/start_game', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ difficulty })
                });
                const data = await response.json();
                if (data.success) {
                    difficultySelector.classList.add('hidden');
                    gameContent.classList.remove('hidden');
                    
                    lowRangeSpan.innerText = data.low;
                    highRangeSpan.innerText = data.high;
                    guessInput.min = data.low;
                    guessInput.max = data.high;
                    
                    gameMessage.innerText = `I have selected a new ${difficulty} number!`;
                    gameMessage.className = "message-area status-info";
                    attemptCount.innerText = "0";
                    guessInput.value = '';
                    guessInput.disabled = false;
                    guessBtn.disabled = false;
                }
            } catch (error) {
                gameMessage.innerText = "Error starting game.";
            }
        }

        // Handle Guessing
        guessBtn.addEventListener('click', async () => {
            const guess = parseInt(guessInput.value);
            const low = parseInt(lowRangeSpan.innerText);
            const high = parseInt(highRangeSpan.innerText);

            if (isNaN(guess) || guess < low || guess > high) {
                gameMessage.innerText = `Please enter a number between ${low} and ${high}.`;
                gameMessage.className = "message-area status-error";
                return;
            }

            try {
                const response = await fetch('/guess', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guess })
                });

                const data = await response.json();

                if (data.success) {
                    gameMessage.innerText = data.message;
                    attemptCount.innerText = data.attempts;
                    
                    if (data.result === 0) {
                        gameMessage.className = "message-area status-success";
                        guessInput.disabled = true;
                        guessBtn.disabled = true;
                    } else {
                        gameMessage.className = "message-area status-info";
                    }
                } else {
                    gameMessage.innerText = data.message;
                    gameMessage.className = "message-area status-error";
                }
            } catch (error) {
                gameMessage.innerText = "Connection error. Try again.";
            }
        });

        // Reset Game
        resetBtn.addEventListener('click', () => {
            difficultySelector.classList.remove('hidden');
            gameContent.classList.add('hidden');
        });

        // Allow Enter key to trigger buttons
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') guessBtn.click();
        });
    </script>
</body>
</html>
